<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F172A">
  <title>나오시마 점심 추천 — 마이리얼트립 워킹투어</title>

  <!-- 카카오톡 OGP 미리보기 -->
  <meta property="og:title" content="나오시마 점심 추천">
  <meta property="og:description" content="마이리얼트립 나오시마 워킹투어 점심 가이드 + 이에프로젝트 家 안내">
  <meta property="og:image" content="https://nowikoes.github.io/naoshima-lunch/images/og-thumbnail.png">
  <meta property="og:url" content="https://nowikoes.github.io/naoshima-lunch/">
  <meta property="og:type" content="website">

  <!-- Pretendard -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.css" rel="stylesheet">

  <style>
    /* ─────────────────────────────────────────────
       PBrain Design System — 인라인 (standalone)
       Reference: apple.com — Clean & Minimal
       ───────────────────────────────────────────── */

    /* ── 디자인 토큰 */
    :root {
      /* 텍스트 */
      --color-text:          #18181B;
      --color-text-sub:      #52525B;
      --color-text-muted:    #A1A1AA;

      /* 배경/서피스 */
      --color-bg:            #FAFAFA;
      --color-surface:       #FFFFFF;
      --color-surface-raised:#F4F4F5;

      /* 선 */
      --color-border:        #E4E4E7;
      --color-border-strong: #D4D4D8;

      /* 포인트 — 단 1색 */
      --color-accent:        #2563EB;
      --color-accent-sub:    #3B82F6;
      --color-accent-bg:     #EFF6FF;

      /* 경고 */
      --color-warn:          #D97706;
      --color-warn-bg:       #FFFBEB;

      /* 성공 */
      --color-ok:            #16A34A;
      --color-ok-bg:         #F0FDF4;
      --color-ok-border:     #BBF7D0;

      /* 오류 */
      --color-error:         #DC2626;
      --color-error-bg:      #FEF2F2;

      /* 헤더 */
      --color-header:        #0F172A;

      /* 간격 */
      --space-1:  4px;
      --space-2:  8px;
      --space-3:  12px;
      --space-4:  16px;
      --space-5:  20px;
      --space-6:  24px;
      --space-8:  32px;
      --space-10: 40px;
      --space-12: 48px;

      /* 형태 */
      --radius-sm:   6px;
      --radius-md:   10px;
      --radius-lg:   14px;
      --radius-xl:   20px;
      --radius-full: 9999px;

      /* 그림자 */
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow:    0 2px 8px rgba(0,0,0,.07), 0 1px 3px rgba(0,0,0,.05);
      --shadow-md: 0 4px 16px rgba(0,0,0,.09), 0 2px 6px rgba(0,0,0,.05);

      /* 타이포그래피 */
      --font-display:  800 28px/1.2 -apple-system,BlinkMacSystemFont,'Pretendard Variable',Pretendard,system-ui,sans-serif;
      --font-title:    700 20px/1.3 -apple-system,BlinkMacSystemFont,'Pretendard Variable',Pretendard,system-ui,sans-serif;
      --font-heading:  700 16px/1.4 -apple-system,BlinkMacSystemFont,'Pretendard Variable',Pretendard,system-ui,sans-serif;
      --font-body:     400 15px/1.65 -apple-system,BlinkMacSystemFont,'Pretendard Variable',Pretendard,system-ui,sans-serif;
      --font-caption:  500 13px/1.6 -apple-system,BlinkMacSystemFont,'Pretendard Variable',Pretendard,system-ui,sans-serif;
      --font-micro:    600 11.5px/1.4 -apple-system,BlinkMacSystemFont,'Pretendard Variable',Pretendard,system-ui,sans-serif;

      /* 기능적 색상 (지도 마커/탭용) */
      --color-food: #FF8F73;
      --color-art:  #6055C0;
    }

    /* ── 리셋 */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html { scroll-behavior: smooth; }

    body {
      font: var(--font-body);
      color: var(--color-text);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── 레이아웃 */
    .pb-wrap {
      max-width: 520px;
      margin: 0 auto;
      background: var(--color-surface);
      min-height: 100vh;
      padding-bottom: calc(var(--space-8) + env(safe-area-inset-bottom));
    }

    /* ── 헤더 */
    .pb-header {
      background: var(--color-header);
      padding: calc(var(--space-8) + env(safe-area-inset-top)) var(--space-6) var(--space-6);
      color: white;
    }
    .pb-header-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: var(--radius-full);
      padding: 4px 12px;
      font: var(--font-micro);
      color: rgba(255,255,255,.8);
      margin-bottom: var(--space-4);
      letter-spacing: 0.01em;
    }
    .pb-header h1 {
      font: var(--font-display);
      letter-spacing: -0.03em;
      margin-bottom: var(--space-2);
    }

    /* ── 섹션 */
    .pb-section {
      padding: var(--space-6) var(--space-5) 0;
    }
    .pb-section + .pb-section {
      padding-top: var(--space-5);
    }
    .pb-section-title {
      font: var(--font-heading);
      color: var(--color-text);
      letter-spacing: -0.015em;
      margin-bottom: var(--space-3);
    }

    /* ── 카드 */
    .pb-card {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      background: var(--color-surface);
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-3);
      overflow: hidden;
    }

    /* ── Mapbox 지도 높이 */
    #map { height: 300px; }

    /* ── 커스텀 마커 (기능적 — 변경 없음) */
    .map-pin {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transform: translateX(-50%);
    }
    .pin-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      transition: transform 0.15s;
    }
    .map-pin:hover .pin-dot { transform: scale(1.3); }
    [data-type="art"]      .pin-dot { background: #9B7BBE; font-size: 8px; }
    [data-type="landmark"] .pin-dot { background: #4A65BF; font-size: 11px; width: 24px; height: 24px; }
    [data-type="food"]     .pin-dot { background: var(--color-food); font-size: 11px; width: 24px; height: 24px; }
    .pin-label {
      margin-top: 2px;
      font-size: 9px;
      font-weight: 700;
      color: var(--color-text);
      white-space: nowrap;
      text-shadow: 0 0 3px #fff, 0 0 3px #fff, 0 0 4px #fff;
      line-height: 1;
    }

    /* ── Mapbox 팝업 커스텀 */
    .mapboxgl-popup-content {
      padding: 8px 14px 10px;
      border-radius: var(--radius-md);
      font: var(--font-caption);
      box-shadow: var(--shadow-md);
      min-width: 80px;
    }
    .popup-name { font-size: 13px; font-weight: 700; color: var(--color-text); }
    .popup-type { font-size: 10px; color: var(--color-text-muted); margin-top: 2px; }
    .mapboxgl-popup-close-button { font-size: 16px; right: 6px; top: 4px; }

    /* ── 탭 바 */
    .pb-tab-bar {
      display: flex;
      gap: 0;
      padding: 0 var(--space-5);
      border-bottom: 1px solid var(--color-border);
    }
    .pb-tab-btn {
      flex: 1;
      padding: 14px 8px;
      border: none;
      background: transparent;
      font: var(--font-body);
      font-weight: 600;
      color: var(--color-text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
      font-family: inherit;
      text-align: center;
    }
    .pb-tab-btn.active {
      color: var(--color-text);
      border-bottom-color: var(--color-text);
    }

    /* ── 탭 콘텐츠 */
    .tab-content {
      display: none;
      padding: var(--space-4) var(--space-5) 0;
      flex-direction: column;
      gap: var(--space-4);
    }
    .tab-content.visible {
      display: flex;
    }

    .loading {
      text-align: center;
      padding: var(--space-10);
      color: var(--color-text-muted);
      font: var(--font-caption);
    }

    /* ── 식당/아트 카드 공통 */
    .pb-card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      background-color: var(--color-surface-raised);
      margin: calc(-1 * var(--space-5));
      margin-bottom: 0;
      width: calc(100% + var(--space-5) * 2);
    }

    .pb-card-body {
      padding-top: var(--space-4);
    }

    .pb-card-name {
      font: var(--font-title);
      margin-bottom: 2px;
    }

    .pb-card-name-jp {
      font-size: 13px;
      color: var(--color-text-muted);
      font-weight: 400;
      margin-left: 6px;
    }

    .pb-card-section {
      margin-top: var(--space-3);
    }

    .pb-card-section-label {
      font: var(--font-micro);
      color: var(--color-text-sub);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: var(--space-1);
    }

    .pb-card-menu {
      font: var(--font-body);
      color: var(--color-text);
    }

    .pb-card-reason {
      font: var(--font-body);
      color: var(--color-text);
    }

    /* ── 배지/태그 */
    .pb-tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: var(--radius-full);
      font: var(--font-micro);
      white-space: nowrap;
    }
    .pb-tag--accent  { background: var(--color-accent-bg);  color: var(--color-accent); }
    .pb-tag--warn    { background: var(--color-warn-bg);    color: var(--color-warn); }
    .pb-tag--ok      { background: var(--color-ok-bg);      color: var(--color-ok); }
    .pb-tag--error   { background: var(--color-error-bg);   color: var(--color-error); }
    .pb-tag--neutral { background: var(--color-surface-raised); color: var(--color-text-sub); }

    .pb-tag-row {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      margin-top: var(--space-2);
    }

    /* ── 버튼 */
    .pb-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      width: 100%;
      border-radius: var(--radius-lg);
      padding: var(--space-4) var(--space-5);
      min-height: 52px;
      margin-top: var(--space-4);
      font: var(--font-body);
      font-weight: 700;
      text-decoration: none;
      transition: opacity .15s, transform .1s;
      cursor: pointer;
      border: none;
    }
    .pb-btn:active { opacity: .75; transform: scale(.98); }

    .pb-btn--primary {
      background: var(--color-accent);
      color: white;
    }
    .pb-btn--secondary {
      background: var(--color-surface-raised);
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }

    /* ── 알림 박스 */
    .pb-alert {
      border-radius: var(--radius-md);
      padding: var(--space-4);
      font: var(--font-caption);
      line-height: 1.65;
      margin-bottom: var(--space-3);
    }
    .pb-alert--accent {
      background: var(--color-accent-bg);
      border-left: 3px solid var(--color-accent);
      color: #1E3A8A;
    }
    .pb-alert--warn {
      background: var(--color-warn-bg);
      border-left: 3px solid var(--color-warn);
      color: #78350F;
    }

    /* ── 경고 아코디언 */
    .pb-warning {
      margin-top: var(--space-3);
      border: 1px solid var(--color-warn);
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--color-warn-bg);
    }

    .pb-warning summary {
      padding: var(--space-3) var(--space-4);
      background: var(--color-warn-bg);
      color: var(--color-warn);
      font: var(--font-caption);
      font-weight: 600;
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .pb-warning summary::-webkit-details-marker { display: none; }

    .pb-warning summary::after {
      content: '\25BC';
      margin-left: auto;
      font-size: 11px;
      transition: transform 0.2s;
    }

    .pb-warning[open] summary::after {
      transform: rotate(180deg);
    }

    .pb-warning-desc {
      padding: var(--space-3) var(--space-4);
      font: var(--font-caption);
      line-height: 1.6;
      color: #78350F;
      border-top: 1px solid rgba(217,119,6,.2);
    }

    .pb-warning-img {
      width: 100%;
      display: block;
    }

    /* ── 이에프로젝트 카드 */
    .pb-art-header {
      padding-top: var(--space-4);
      display: flex;
      align-items: flex-start;
      gap: var(--space-4);
    }

    .pb-art-badge {
      width: 46px;
      height: 46px;
      border-radius: var(--radius-lg);
      background: var(--color-art);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      font-weight: 800;
      flex-shrink: 0;
      letter-spacing: -1px;
    }

    .pb-art-meta {
      flex: 1;
    }

    .pb-art-meta .pb-card-name {
      font-size: 19px;
      margin-bottom: 2px;
    }

    .pb-art-artist {
      font: var(--font-micro);
      color: var(--color-text-sub);
      margin-top: 1px;
    }

    .pb-art-artwork {
      display: inline-block;
      margin-top: var(--space-2);
      font: var(--font-caption);
      font-style: italic;
      color: var(--color-accent);
      font-weight: 600;
    }

    /* ── 이미지 래퍼 (오버레이용) */
    .pb-card-image-wrap {
      position: relative;
      margin: calc(-1 * var(--space-5));
      margin-bottom: 0;
    }
    .pb-card-image-wrap .pb-card-image {
      margin: 0;
      width: 100%;
    }
    .pb-closed-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.42);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pb-closed-label {
      background: rgba(220,38,38,0.92);
      color: white;
      font: var(--font-heading);
      padding: 7px 20px;
      border-radius: var(--radius-full);
      letter-spacing: 0.01em;
    }

    /* ── 휴무 카드 전체 흐림 */
    .pb-card--closed {
      opacity: 0.52;
    }

    /* ── 섹션 구분선 */
    .pb-divider {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) 0 var(--space-1);
      color: var(--color-text-muted);
      font: var(--font-micro);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .pb-divider::before, .pb-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    /* ── 푸터 */
    .pb-footer {
      padding: var(--space-8) var(--space-5) calc(var(--space-5) + env(safe-area-inset-bottom));
      text-align: center;
      color: var(--color-text-sub);
      font-size: 14px;
      line-height: 1.8;
      border-top: 1px solid var(--color-border);
      margin-top: var(--space-8);
    }
  </style>
</head>
<body>

<div class="pb-wrap">

  <div class="pb-header">
    <div class="pb-header-badge">🏝️ 마이리얼트립 나오시마 워킹투어</div>
    <h1>오늘 점심은<br>이렇게 추천드려요</h1>
  </div>

  <!-- ─── 지도: Mapbox GL JS ─────────────────────── -->
  <div class="pb-section">
    <div class="pb-section-title">혼무라 일대 위치 안내</div>
    <div class="pb-card" style="padding:0; overflow:hidden;">
      <div id="map"></div>
    </div>
  </div>

  <!-- ─── 탭 바 ───────────────────────────────── -->
  <div class="pb-tab-bar">
    <button class="pb-tab-btn active" id="btn-lunch" data-tab="lunch" aria-selected="true">
      점심 식당
    </button>
    <button class="pb-tab-btn" id="btn-art" data-tab="art" aria-selected="false">
      이에프로젝트 家
    </button>
  </div>

  <!-- ─── 탭 콘텐츠: 점심 식당 ─────────────────── -->
  <section id="tab-lunch" class="tab-content visible" role="tabpanel">
    <p class="loading">식당 정보 불러오는 중...</p>
  </section>

  <!-- ─── 탭 콘텐츠: 이에프로젝트 ──────────────── -->
  <section id="tab-art" class="tab-content" role="tabpanel">
    <p class="loading">이에프로젝트 정보 불러오는 중...</p>
  </section>

  <div class="pb-footer">
    <p>문의사항은 편히 말씀해 주세요 :)</p>
  </div>

</div>

  <script>
    /* ── 안전 URL 검사 ── */
    function safeUrl(url) {
      if (!url || !url.includes('://')) return url;
      try {
        const u = new URL(url);
        return (u.protocol === 'https:' || u.protocol === 'http:') ? url : '#';
      } catch { return '#'; }
    }

    /* ── 탭 전환 ── */
    const tabBtns = document.querySelectorAll('.pb-tab-btn');
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        tabBtns.forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-selected', 'false');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('visible'));
        document.getElementById('tab-' + tab).classList.add('visible');
      });
    });

    /* ── 오늘 휴무 여부 판단 ── */
    const DAY_MAP = { '월': 1, '화': 2, '수': 3, '목': 4, '금': 5, '토': 6, '일': 0 };
    const TODAY = new Date().getDay();
    function isClosedToday(closedDays) {
      if (!closedDays) return false;
      return Object.entries(DAY_MAP).some(([kr, num]) => closedDays.includes(kr) && TODAY === num);
    }

    /* ── 식당 카드 렌더 ── */
    function renderRestaurants(restaurants) {
      const section = document.getElementById('tab-lunch');
      section.innerHTML = '';

      const open   = restaurants.filter(r => !isClosedToday(r.closedDays));
      const closed = restaurants.filter(r =>  isClosedToday(r.closedDays));

      const buildCard = (r) => {
        const isClosed = isClosedToday(r.closedDays);
        const card = document.createElement('article');
        card.className = 'pb-card' + (isClosed ? ' pb-card--closed' : '');
        card.innerHTML = `
          <div class="pb-card-image-wrap">
            <img class="pb-card-image" src="${safeUrl(r.image)}" alt="${r.name} 사진" loading="lazy">
            ${isClosed ? `<div class="pb-closed-overlay"><span class="pb-closed-label">오늘 휴무</span></div>` : ''}
          </div>
          <div class="pb-card-body">
            <h2 class="pb-card-name">
              ${r.name}<span class="pb-card-name-jp">${r.nameJp}</span>
            </h2>
            <div class="pb-tag-row">
              ${r.closedDays ? `<span class="pb-tag ${isClosed ? 'pb-tag--error' : 'pb-tag--neutral'}">${r.closedDays}</span>` : ''}
              ${r.notice ? `<span class="pb-tag pb-tag--warn">${r.notice}</span>` : ''}
            </div>
            <div class="pb-card-section">
              <p class="pb-card-section-label">메뉴</p>
              <p class="pb-card-menu">${r.menu}</p>
            </div>
            <div class="pb-card-section">
              <p class="pb-card-section-label">추천 이유</p>
              <p class="pb-card-reason">${r.reason}</p>
            </div>
            ${r.warningImage ? `
            <details class="pb-warning"${r.warningOpen ? ' open' : ''}>
              <summary>구글맵 위치 주의 — 약도 확인 필요</summary>
              <p class="pb-warning-desc">지도 앱이 안내하는 방향과 실제 위치가 달라요. 근처에 도착하면 인근 안내판 약도를 확인하거나 아래 안내도를 참고하세요.</p>
              <img class="pb-warning-img" src="${safeUrl(r.warningImage)}" alt="${r.name} 찾아가는 길 안내도" loading="lazy">
            </details>` : ''}
            <a class="pb-btn ${isClosed ? 'pb-btn--secondary' : 'pb-btn--primary'}"
               href="${safeUrl(r.mapUrl)}"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="${r.name} 지도 보기 (새 창에서 열림)">
              <span aria-hidden="true">🗺</span>&nbsp; 지도 보기
            </a>
          </div>
        `;
        return card;
      };

      open.forEach(r => section.appendChild(buildCard(r)));

      if (closed.length > 0) {
        const divider = document.createElement('div');
        divider.className = 'pb-divider';
        divider.textContent = '오늘 휴무';
        section.appendChild(divider);
        closed.forEach(r => section.appendChild(buildCard(r)));
      }
    }

    /* ── 이에프로젝트 카드 렌더 ── */
    function renderArthouses(houses) {
      const section = document.getElementById('tab-art');
      section.innerHTML = '';
      houses.forEach(h => {
        const card = document.createElement('article');
        card.className = 'pb-card';
        card.innerHTML = `
          ${h.image ? `<img class="pb-card-image" src="${safeUrl(h.image)}" alt="${h.name} 사진" loading="lazy">` : ''}
          <div class="pb-art-header">
            <div class="pb-art-badge">家</div>
            <div class="pb-art-meta">
              <h2 class="pb-card-name">
                ${h.name}<span class="pb-card-name-jp">${h.nameJp}</span>
              </h2>
              <p class="pb-art-artist">${h.artist} · ${h.artistEn}</p>
              <span class="pb-art-artwork">${h.artwork}</span>
            </div>
          </div>
          <div class="pb-card-body">
            <div class="pb-card-section">
              <p class="pb-card-section-label">공간 · 작품</p>
              <p class="pb-card-reason">${h.description}</p>
            </div>
            <div class="pb-card-section">
              <p class="pb-card-section-label">포인트</p>
              <p class="pb-card-reason">${h.highlight}</p>
            </div>
            ${h.notice ? `<div class="pb-tag-row"><span class="pb-tag pb-tag--warn">${h.notice}</span></div>` : ''}
            <div class="pb-alert pb-alert--accent" style="margin-top: var(--space-3);">
              ${h.artistNote}
            </div>
            <a class="pb-btn pb-btn--secondary"
               href="${safeUrl(h.mapUrl)}"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="${h.name} 지도 보기 (새 창에서 열림)">
              <span aria-hidden="true">🗺</span>&nbsp; 지도 보기
            </a>
          </div>
        `;
        section.appendChild(card);
      });
    }

    /* ── 데이터 로드 ── */
    async function loadAll() {
      try {
        const [rRes, aRes] = await Promise.all([
          fetch('restaurants.json'),
          fetch('ie-project.json')
        ]);
        if (!rRes.ok) throw new Error('restaurants.json 로딩 실패');
        if (!aRes.ok) throw new Error('ie-project.json 로딩 실패');
        const [restaurants, arthouses] = await Promise.all([rRes.json(), aRes.json()]);
        renderRestaurants(restaurants);
        renderArthouses(arthouses);
      } catch (err) {
        document.getElementById('tab-lunch').innerHTML =
          '<p class="loading">정보를 불러오지 못했어요. 가이드에게 문의하세요.</p>';
        console.error(err);
      }
    }

    loadAll();
  </script>

  <!-- ── Mapbox GL JS ──────────────────────────────────────── -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.js"></script>
  <script>
    /* ── 토큰: mapbox.com → Tokens 탭에서 복사 후 교체 ── */
    mapboxgl.accessToken = 'pk.eyJ1Ijoia2l3b24tc2VvIiwiYSI6ImNtbWFoeHMweTBkdzQzNHBybWVwdmQyMHoifQ.4odZo1llAn_a5qYXCKjtVw';

    /* ── 장소 데이터 ── */
    const MAP_PLACES = [
      // 이에프로젝트 家
      { type: 'art',      emoji: '家', name: '이시바시',   coord: [133.9951, 34.4622] },
      { type: 'art',      emoji: '家', name: '고카이쇼',   coord: [133.9969, 34.4606] },
      { type: 'art',      emoji: '家', name: '가도야',     coord: [133.9975, 34.4602] },
      { type: 'art',      emoji: '家', name: '하이샤',     coord: [133.9945, 34.4599] },
      { type: 'art',      emoji: '家', name: '고오신사',   coord: [133.9985, 34.4597] },
      { type: 'art',      emoji: '家', name: '미나미데라', coord: [133.9970, 34.4589] },
      { type: 'art',      emoji: '家', name: '긴자',       coord: [133.9957, 34.4598] },
      // 랜드마크
      { type: 'landmark', emoji: '🏠', name: '혼무라라운지', coord: [133.9972, 34.4610] },
      { type: 'landmark', emoji: '🏛', name: '안도뮤지엄',   coord: [133.9966, 34.4595] },
      { type: 'landmark', emoji: '🖼', name: '신미술관',     coord: [133.9985, 34.4574] },
      // 식당
      { type: 'food', emoji: '🍛', name: '콘니치와', coord: [133.9979, 34.4613] },
      { type: 'food', emoji: '🍕', name: '루크스',   coord: [133.9985, 34.4611] },
      { type: 'food', emoji: '🍱', name: '토시',     coord: [133.9920, 34.4603] },
      { type: 'food', emoji: '🍽', name: '에이프런', coord: [133.9960, 34.4600] },
      { type: 'food', emoji: '🥞', name: '사라장',   coord: [133.9967, 34.4578] },
      { type: 'food', emoji: '🍳', name: '나카오쿠', coord: [133.9952, 34.4578] },
    ];

    const TYPE_LABEL = { art: '이에프로젝트 家', landmark: '랜드마크', food: '식당' };

    /* ── 지도 초기화: 전체 마커가 들어오는 bounds 자동 계산 ── */
    const lngs = MAP_PLACES.map(p => p.coord[0]);
    const lats = MAP_PLACES.map(p => p.coord[1]);
    const bounds = [
      [Math.min(...lngs) - 0.002, Math.min(...lats) - 0.001],
      [Math.max(...lngs) + 0.002, Math.max(...lats) + 0.001],
    ];

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/light-v11',
      bounds,
      fitBoundsOptions: { padding: 40 },
      attributionControl: false,
    });

    map.addControl(new mapboxgl.AttributionControl({ compact: true }));
    map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'top-right');

    /* ── 로드 후: POI 레이블 숨김 ── */
    map.on('style.load', () => {
      ['poi-label', 'transit-label'].forEach(id => {
        if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'none');
      });
    });

    /* ── 마커 생성 ── */
    map.on('load', () => {
      MAP_PLACES.forEach(place => {
        const pin = document.createElement('div');
        pin.className = 'map-pin';
        pin.setAttribute('data-type', place.type);

        const dot = document.createElement('div');
        dot.className = 'pin-dot';
        dot.textContent = place.emoji;

        const label = document.createElement('div');
        label.className = 'pin-label';
        label.textContent = place.name;

        pin.appendChild(dot);
        pin.appendChild(label);

        const popup = new mapboxgl.Popup({ offset: 20, closeButton: true, maxWidth: '180px' })
          .setHTML(`
            <div class="popup-name">${place.name}</div>
            <div class="popup-type">${TYPE_LABEL[place.type]}</div>
          `);

        new mapboxgl.Marker({ element: pin, anchor: 'top' })
          .setLngLat(place.coord)
          .setPopup(popup)
          .addTo(map);
      });
    });
  </script>
