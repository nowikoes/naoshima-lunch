<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나오시마 점심 추천 🍜 — 마이리얼트립 워킹투어</title>

  <!-- 카카오톡 OGP 미리보기 -->
  <meta property="og:title" content="나오시마 점심 추천 🍜">
  <meta property="og:description" content="마이리얼트립 나오시마 워킹투어 점심 가이드 + 이에프로젝트 家 안내">
  <meta property="og:image" content="https://nowikoes.github.io/naoshima-lunch/images/og-thumbnail.png">
  <meta property="og:type" content="website">

  <style>
    /* ─── 전역 초기화 ─────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-coral: #FF8F73;
      --color-coral-dark: #E8673D;
      --color-art: #6055C0;
      --color-art-dark: #4A3A8A;
      --color-bg: #F5F5F5;
      --color-card: #FFFFFF;
      --color-text: #1A1A1A;
      --color-subtext: #666666;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, 'Noto Sans KR', BlinkMacSystemFont, sans-serif;
      background-color: var(--color-bg);
      color: var(--color-text);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* ─── 헤더 ───────────────────────────────────── */
    .site-header {
      background-color: var(--color-coral);
      color: white;
      padding: 20px 16px 24px;
      text-align: center;
    }

    .header-brand {
      font-size: 12px;
      opacity: 0.85;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .header-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
    }

    /* ─── 지도 섹션 ──────────────────────────── */
    .map-section {
      padding: 16px 12px 4px;
    }

    .map-section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--color-subtext);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .map-wrap {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      line-height: 0;
    }

    .map-wrap svg text {
      font-family: -apple-system, 'Noto Sans KR', BlinkMacSystemFont, sans-serif;
    }

    /* ─── 탭 바 ──────────────────────────────── */
    .tab-bar {
      display: flex;
      padding: 16px 12px 0;
      gap: 6px;
    }

    .tab-btn {
      flex: 1;
      padding: 11px 8px;
      border: none;
      border-radius: 10px 10px 0 0;
      font-size: 14px;
      font-weight: 600;
      background: #E0E0E0;
      color: var(--color-subtext);
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
      font-family: inherit;
    }

    .tab-btn.active-lunch {
      background: var(--color-coral);
      color: white;
    }

    .tab-btn.active-art {
      background: var(--color-art);
      color: white;
    }

    /* ─── 탭 콘텐츠 ──────────────────────────── */
    .tab-content {
      display: none;
      padding: 12px 12px 0;
      flex-direction: column;
      gap: 16px;
    }

    .tab-content.visible {
      display: flex;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--color-subtext);
    }

    /* ─── 식당 카드 ───────────────────────────────── */
    .card {
      background: var(--color-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      background-color: #E0E0E0;
    }

    .card-body {
      padding: 16px;
    }

    .card-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .card-name-jp {
      font-size: 13px;
      color: var(--color-subtext);
      font-weight: 400;
      margin-left: 6px;
    }

    .card-section {
      margin-top: 12px;
    }

    .card-section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-subtext);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .card-menu {
      font-size: 15px;
      line-height: 1.5;
      color: var(--color-text);
    }

    .card-reason {
      font-size: 15px;
      line-height: 1.6;
      color: var(--color-text);
    }

    .btn-map {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      min-height: 48px;
      transition: background-color 0.15s;
    }

    .btn-map-lunch {
      background-color: var(--color-coral);
    }

    .btn-map-lunch:active {
      background-color: var(--color-coral-dark);
    }

    .btn-map-art {
      background-color: var(--color-art);
    }

    .btn-map-art:active {
      background-color: var(--color-art-dark);
    }

    /* ─── 결제 배지 ──────────────────────────────── */
    .notice-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 10px;
      background: #FFF3CD;
      color: #856404;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    /* ─── 길찾기 주의 아코디언 ────────────────────── */
    .card-warning {
      margin-top: 12px;
      border: 1px solid #FFE0B2;
      border-radius: 8px;
      overflow: hidden;
    }

    .card-warning summary {
      padding: 10px 14px;
      background: #FFF8E1;
      color: #E65100;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-warning summary::-webkit-details-marker { display: none; }

    .card-warning summary::after {
      content: '▼';
      margin-left: auto;
      font-size: 11px;
      transition: transform 0.2s;
    }

    .card-warning[open] summary::after {
      transform: rotate(180deg);
    }

    .card-warning-desc {
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.6;
      color: #5D4037;
      background: #FFFDE7;
      border-top: 1px solid #FFE0B2;
    }

    .card-warning-img {
      width: 100%;
      display: block;
    }

    /* ─── 이에프로젝트 카드 ───────────────────────── */
    .card-art-header {
      padding: 16px 16px 0;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .card-art-badge {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: var(--color-art);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      font-weight: 800;
      flex-shrink: 0;
      letter-spacing: -1px;
    }

    .card-art-meta {
      flex: 1;
    }

    .card-art-meta .card-name {
      font-size: 19px;
      margin-bottom: 2px;
    }

    .card-artist {
      font-size: 12px;
      color: var(--color-subtext);
      margin-top: 1px;
    }

    .card-artwork {
      display: inline-block;
      margin-top: 8px;
      font-size: 13px;
      font-style: italic;
      color: var(--color-art);
      font-weight: 600;
    }

    .artist-note {
      margin-top: 12px;
      padding: 9px 12px;
      background: #F0EEF9;
      border-left: 3px solid var(--color-art);
      border-radius: 0 6px 6px 0;
      font-size: 12px;
      color: var(--color-art-dark);
      line-height: 1.6;
    }

    /* ─── 푸터 ───────────────────────────────────── */
    .site-footer {
      text-align: center;
      padding: 24px 16px;
      color: var(--color-subtext);
      font-size: 14px;
    }
  </style>
</head>

  </section>

  <!-- ─── 탭 콘텐츠: 이에프로젝트 ──────────────── -->

  <footer class="site-footer">
    <p>문의사항은 편히 말씀해 주세요 :)</p>
  </footer>

  <script>
    /* ── 안전 URL 검사 ── */
    function safeUrl(url) {
      if (!url || !url.includes('://')) return url;
      try {
        const u = new URL(url);
        return (u.protocol === 'https:' || u.protocol === 'http:') ? url : '#';
      } catch { return '#'; }
    }

    /* ── 탭 전환 ── */
    const tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        tabBtns.forEach(b => {
          b.classList.remove('active-lunch', 'active-art');
          b.setAttribute('aria-selected', 'false');
        });
        btn.classList.add(tab === 'lunch' ? 'active-lunch' : 'active-art');
        btn.setAttribute('aria-selected', 'true');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('visible'));
        document.getElementById('tab-' + tab).classList.add('visible');
      });
    });

    /* ── 식당 카드 렌더 ── */
    function renderRestaurants(restaurants) {
      const section = document.getElementById('tab-lunch');
      section.innerHTML = '';
      restaurants.forEach(r => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <img class="card-image" src="${safeUrl(r.image)}" alt="${r.name} 사진" loading="lazy">
          <div class="card-body">
            <h2 class="card-name">
              ${r.name}<span class="card-name-jp">${r.nameJp}</span>
            </h2>
            ${r.notice ? `<span class="notice-badge">${r.notice}</span>` : ''}
            <div class="card-section">
              <p class="card-section-label">🍱 메뉴</p>
              <p class="card-menu">${r.menu}</p>
            </div>
            <div class="card-section">
              <p class="card-section-label">✨ 추천 이유</p>
              <p class="card-reason">${r.reason}</p>
            </div>
            ${r.warningImage ? `
            <details class="card-warning">
              <summary>⚠️ 구글맵 위치 주의 — 약도 확인 필요</summary>
              <p class="card-warning-desc">지도 앱이 안내하는 방향과 실제 위치가 달라요. 근처에 도착하면 인근 안내판 약도를 확인하거나 아래 안내도를 참고하세요.</p>
              <img class="card-warning-img" src="${safeUrl(r.warningImage)}" alt="${r.name} 찾아가는 길 안내도" loading="lazy">
            </details>` : ''}
            <a class="btn-map btn-map-lunch"
               href="${safeUrl(r.mapUrl)}"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="${r.name} 지도 보기 (새 창에서 열림)">
              <span aria-hidden="true">🗺</span>&nbsp; 지도 보기
            </a>
          </div>
        `;
        section.appendChild(card);
      });
    }

    /* ── 이에프로젝트 카드 렌더 ── */
    function renderArthouses(houses) {
      const section = document.getElementById('tab-art');
      section.innerHTML = '';
      houses.forEach(h => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          ${h.image ? `<img class="card-image" src="${safeUrl(h.image)}" alt="${h.name} 사진" loading="lazy">` : ''}
          <div class="card-art-header">
            <div class="card-art-badge">家</div>
            <div class="card-art-meta">
              <h2 class="card-name">
                ${h.name}<span class="card-name-jp">${h.nameJp}</span>
              </h2>
              <p class="card-artist">${h.artist} · ${h.artistEn}</p>
              <span class="card-artwork">「${h.artwork}」</span>
            </div>
          </div>
          <div class="card-body">
            <div class="card-section">
              <p class="card-section-label">🎨 공간 · 작품</p>
              <p class="card-reason">${h.description}</p>
            </div>
            <div class="card-section">
              <p class="card-section-label">✨ 포인트</p>
              <p class="card-reason">${h.highlight}</p>
            </div>
            ${h.notice ? `<span class="notice-badge">${h.notice}</span>` : ''}
            <p class="artist-note">💎 ${h.artistNote}</p>
            <a class="btn-map btn-map-art"
               href="${safeUrl(h.mapUrl)}"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="${h.name} 지도 보기 (새 창에서 열림)">
              <span aria-hidden="true">🗺</span>&nbsp; 지도 보기
            </a>
          </div>
        `;
        section.appendChild(card);
      });
    }

    /* ── 데이터 로드 ── */
    async function loadAll() {
      try {
        const [rRes, aRes] = await Promise.all([
          fetch('restaurants.json'),
          fetch('ie-project.json')
        ]);
        if (!rRes.ok) throw new Error('restaurants.json 로딩 실패');
        if (!aRes.ok) throw new Error('ie-project.json 로딩 실패');
        const [restaurants, arthouses] = await Promise.all([rRes.json(), aRes.json()]);
        renderRestaurants(restaurants);
        renderArthouses(arthouses);
      } catch (err) {
        document.getElementById('tab-lunch').innerHTML =
          '<p class="loading">정보를 불러오지 못했어요. 가이드에게 문의하세요.</p>';
        console.error(err);
      }
    }

    loadAll();
  </script>
