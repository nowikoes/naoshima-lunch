<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나오시마 점심 추천 🍜 — 마이리얼트립 워킹투어</title>

  <!-- 카카오톡 OGP 미리보기 -->
  <meta property="og:title" content="나오시마 점심 추천 🍜">
  <meta property="og:description" content="마이리얼트립 나오시마 워킹투어 점심 가이드 + 이에프로젝트 家 안내">
  <meta property="og:image" content="https://nowikoes.github.io/naoshima-lunch/images/og-thumbnail.png">
  <meta property="og:type" content="website">

  <style>
    /* ─── 전역 초기화 ─────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-coral: #FF8F73;
      --color-coral-dark: #E8673D;
      --color-art: #6055C0;
      --color-art-dark: #4A3A8A;
      --color-bg: #F5F5F5;
      --color-card: #FFFFFF;
      --color-text: #1A1A1A;
      --color-subtext: #666666;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, 'Noto Sans KR', BlinkMacSystemFont, sans-serif;
      background-color: var(--color-bg);
      color: var(--color-text);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* ─── 헤더 ───────────────────────────────────── */
    .site-header {
      background-color: var(--color-coral);
      color: white;
      padding: 20px 16px 24px;
      text-align: center;
    }

    .header-brand {
      font-size: 12px;
      opacity: 0.85;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .header-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
    }

    /* ─── 지도 섹션 ──────────────────────────── */
    .map-section {
      padding: 16px 12px 4px;
    }

    .map-section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--color-subtext);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .map-wrap {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      line-height: 0;
    }

    .map-wrap svg text {
      font-family: -apple-system, 'Noto Sans KR', BlinkMacSystemFont, sans-serif;
    }

    /* ─── 탭 바 ──────────────────────────────── */
    .tab-bar {
      display: flex;
      padding: 16px 12px 0;
      gap: 6px;
    }

    .tab-btn {
      flex: 1;
      padding: 11px 8px;
      border: none;
      border-radius: 10px 10px 0 0;
      font-size: 14px;
      font-weight: 600;
      background: #E0E0E0;
      color: var(--color-subtext);
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
      font-family: inherit;
    }

    .tab-btn.active-lunch {
      background: var(--color-coral);
      color: white;
    }

    .tab-btn.active-art {
      background: var(--color-art);
      color: white;
    }

    /* ─── 탭 콘텐츠 ──────────────────────────── */
    .tab-content {
      display: none;
      padding: 12px 12px 0;
      flex-direction: column;
      gap: 16px;
    }

    .tab-content.visible {
      display: flex;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--color-subtext);
    }

    /* ─── 식당 카드 ───────────────────────────────── */
    .card {
      background: var(--color-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      background-color: #E0E0E0;
    }

    .card-body {
      padding: 16px;
    }

    .card-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .card-name-jp {
      font-size: 13px;
      color: var(--color-subtext);
      font-weight: 400;
      margin-left: 6px;
    }

    .card-section {
      margin-top: 12px;
    }

    .card-section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-subtext);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .card-menu {
      font-size: 15px;
      line-height: 1.5;
      color: var(--color-text);
    }

    .card-reason {
      font-size: 15px;
      line-height: 1.6;
      color: var(--color-text);
    }

    .btn-map {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      min-height: 48px;
      transition: background-color 0.15s;
    }

    .btn-map-lunch {
      background-color: var(--color-coral);
    }

    .btn-map-lunch:active {
      background-color: var(--color-coral-dark);
    }

    .btn-map-art {
      background-color: var(--color-art);
    }

    .btn-map-art:active {
      background-color: var(--color-art-dark);
    }

    /* ─── 결제 배지 ──────────────────────────────── */
    .notice-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 10px;
      background: #FFF3CD;
      color: #856404;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    /* ─── 길찾기 주의 아코디언 ────────────────────── */
    .card-warning {
      margin-top: 12px;
      border: 1px solid #FFE0B2;
      border-radius: 8px;
      overflow: hidden;
    }

    .card-warning summary {
      padding: 10px 14px;
      background: #FFF8E1;
      color: #E65100;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-warning summary::-webkit-details-marker { display: none; }

    .card-warning summary::after {
      content: '▼';
      margin-left: auto;
      font-size: 11px;
      transition: transform 0.2s;
    }

    .card-warning[open] summary::after {
      transform: rotate(180deg);
    }

    .card-warning-desc {
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.6;
      color: #5D4037;
      background: #FFFDE7;
      border-top: 1px solid #FFE0B2;
    }

    .card-warning-img {
      width: 100%;
      display: block;
    }

    /* ─── 이에프로젝트 카드 ───────────────────────── */
    .card-art-header {
      padding: 16px 16px 0;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .card-art-badge {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: var(--color-art);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      font-weight: 800;
      flex-shrink: 0;
      letter-spacing: -1px;
    }

    .card-art-meta {
      flex: 1;
    }

    .card-art-meta .card-name {
      font-size: 19px;
      margin-bottom: 2px;
    }

    .card-artist {
      font-size: 12px;
      color: var(--color-subtext);
      margin-top: 1px;
    }

    .card-artwork {
      display: inline-block;
      margin-top: 8px;
      font-size: 13px;
      font-style: italic;
      color: var(--color-art);
      font-weight: 600;
    }

    .artist-note {
      margin-top: 12px;
      padding: 9px 12px;
      background: #F0EEF9;
      border-left: 3px solid var(--color-art);
      border-radius: 0 6px 6px 0;
      font-size: 12px;
      color: var(--color-art-dark);
      line-height: 1.6;
    }

    /* ─── 푸터 ───────────────────────────────────── */
    .site-footer {
      text-align: center;
      padding: 24px 16px;
      color: var(--color-subtext);
      font-size: 14px;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-brand">마이리얼트립 나오시마 워킹투어</div>
    <h1 class="header-title">오늘 점심은 이렇게 추천드려요 🍜</h1>
  </header>

  <!-- ─── 지도: 구글맵 실좌표 기반 ────────────────────
       bounding box: lon 133.989→x=20  134.001→x=420
                     lat 34.465→y=20   34.454→y=260
       scale_lon = 400/0.012 = 33,333 px/deg
       scale_lat = 240/0.011 = 21,818 px/deg
       x = 20 + (lon - 133.989) × 33333
       y = 20 + (34.465 - lat) × 21818
       ───────────────────────────────────────────── -->
  <section class="map-section">
    <p class="map-section-title">혼무라 일대 위치 안내</p>
    <div class="map-wrap">
      <svg viewBox="0 0 440 280" width="100%" xmlns="http://www.w3.org/2000/svg"
           role="img" aria-label="나오시마 혼무라 일대 지도">
        <defs>
          <filter id="ps">
            <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-opacity="0.2"/>
          </filter>
        </defs>

        <!-- 배경 -->
        <rect width="440" height="280" fill="#FFF6EE"/>

        <!-- 세토내해 — lon 134.000 → x=387 -->
        <path d="M 392 0 C 388 50 383 108 375 148 C 368 185 372 235 378 280 L 440 280 L 440 0 Z"
              fill="#D6EAF8" opacity="0.75"/>
        <text x="415" y="90" font-size="8" fill="#8BBDD4" opacity="0.8"
              writing-mode="vertical-rl" letter-spacing="2">세토내해</text>
        <text x="400" y="50"  font-size="9" fill="#9DC8E0" opacity="0.6">〰</text>
        <text x="398" y="155" font-size="9" fill="#9DC8E0" opacity="0.5">〰</text>
        <text x="400" y="245" font-size="9" fill="#9DC8E0" opacity="0.55">〰</text>

        <!-- 방위 -->
        <text x="16" y="22" font-size="10" fill="#C0A898" font-weight="700">N ↑</text>

        <!-- ── 도로망 ──
             x = 20 + (lon - 133.989) × 33333
             y = 20 + (34.465 - lat) × 21818
             N-S 주도로:           lon≈133.997 → x=288, y 48→222
             NW 이시바시 소로:      (222,80) → (288,83)
             N 항구 접근로 (ENE):   (195,92) → (385,85)
             W 마을로 (토시·하이샤): (100,126) → (288,131)
             E 마을로 (고오신사):    (288,133) → (352,137)
             S E-W:                (215,177) → (352,182)
             Route 256 (해안로):    M 385 85 C 382 120 375 155 366 185 C 360 208 358 232 360 255
        -->
        <!-- N-S 주도로 -->
        <line x1="288" y1="48"  x2="288" y2="222"
              stroke="#EDD9C8" stroke-width="10" stroke-linecap="round"/>
        <!-- NW 이시바시 소로 -->
        <line x1="222" y1="80"  x2="288" y2="83"
              stroke="#EDD9C8" stroke-width="6"  stroke-linecap="round"/>
        <!-- N 항구 접근로 (항구 방향 ENE) -->
        <line x1="195" y1="92"  x2="385" y2="85"
              stroke="#EDD9C8" stroke-width="9"  stroke-linecap="round"/>
        <!-- W 마을로 (토시·하이샤) -->
        <line x1="100" y1="126" x2="288" y2="131"
              stroke="#EDD9C8" stroke-width="7"  stroke-linecap="round"/>
        <!-- E 마을로 (고오신사) -->
        <line x1="288" y1="133" x2="352" y2="137"
              stroke="#EDD9C8" stroke-width="6"  stroke-linecap="round"/>
        <!-- S E-W (사라장·나카오쿠·신미술관) -->
        <line x1="215" y1="177" x2="352" y2="182"
              stroke="#EDD9C8" stroke-width="7"  stroke-linecap="round"/>
        <!-- Route 256 (해안로) -->
        <path d="M 385 85 C 382 120 375 155 366 185 C 360 208 358 232 360 255"
              stroke="#EDD9C8" stroke-width="8"  stroke-linecap="round" fill="none"/>

        <!-- 내륙 장식 (서쪽) -->
        <text x="38"  y="68"  font-size="16" opacity="0.28">🌿</text>
        <text x="42"  y="178" font-size="13" opacity="0.22">🌿</text>
        <text x="35"  y="245" font-size="12" opacity="0.20">🌿</text>

        <!-- ══ 이에프로젝트 家 — 보라 소형 (r=5) ══
             x = 20 + (lon - 133.989) × 33333
             y = 20 + (34.465 - lat) × 21818
             이시바시:   133.9951, 34.4622 → cx=223 cy=81
             고카이쇼:   133.9969, 34.4606 → cx=283 cy=116
             가도야:     133.9975, 34.4602 → cx=303 cy=125
             하이샤:     133.9945, 34.4599 → cx=202 cy=131
             고오신사:   133.9985, 34.4597 → cx=337 cy=136
             미나미데라: 133.9970, 34.4589 → cx=287 cy=153
             긴자:       133.9957, 34.4598 → cx=243 (왜곡→cx=240 cy=137)
        -->

        <!-- 이시바시 -->
        <circle cx="223" cy="81" r="5" fill="#9B7BBE"/>
        <text x="223" y="85" text-anchor="middle" font-size="6" fill="white" font-weight="700">家</text>
        <text x="214" y="78" text-anchor="end" font-size="7" fill="#7B5BA0"
              stroke="white" stroke-width="2.5" paint-order="stroke">이시바시</text>

        <!-- 고카이쇼 -->
        <circle cx="283" cy="116" r="5" fill="#9B7BBE"/>
        <text x="283" y="120" text-anchor="middle" font-size="6" fill="white" font-weight="700">家</text>
        <text x="283" y="108" text-anchor="middle" font-size="7" fill="#7B5BA0"
              stroke="white" stroke-width="2.5" paint-order="stroke">고카이쇼</text>

        <!-- 가도야 -->
        <circle cx="303" cy="125" r="5" fill="#9B7BBE"/>
        <text x="303" y="129" text-anchor="middle" font-size="6" fill="white" font-weight="700">家</text>
        <text x="311" y="122" text-anchor="start" font-size="7" fill="#7B5BA0"
              stroke="white" stroke-width="2.5" paint-order="stroke">가도야</text>

        <!-- 하이샤 -->
        <circle cx="202" cy="131" r="5" fill="#9B7BBE"/>
        <text x="202" y="135" text-anchor="middle" font-size="6" fill="white" font-weight="700">家</text>
        <text x="194" y="128" text-anchor="end" font-size="7" fill="#7B5BA0"
              stroke="white" stroke-width="2.5" paint-order="stroke">하이샤</text>

        <!-- 고오신사 -->
        <circle cx="337" cy="136" r="5" fill="#9B7BBE"/>
        <text x="337" y="140" text-anchor="middle" font-size="6" fill="white" font-weight="700">家</text>
        <text x="345" y="133" text-anchor="start" font-size="7" fill="#7B5BA0"
              stroke="white" stroke-width="2.5" paint-order="stroke">고오신사</text>

        <!-- 미나미데라 -->
        <circle cx="287" cy="153" r="5" fill="#9B7BBE"/>
        <text x="287" y="157" text-anchor="middle" font-size="6" fill="white" font-weight="700">家</text>
        <text x="287" y="163" text-anchor="middle" font-size="7" fill="#7B5BA0"
              stroke="white" stroke-width="2.5" paint-order="stroke">미나미데라</text>

        <!-- 긴자 (왜곡: 실좌표 243,133 → 240,137) -->
        <circle cx="240" cy="137" r="5" fill="#9B7BBE"/>
        <text x="240" y="141" text-anchor="middle" font-size="6" fill="white" font-weight="700">家</text>
        <text x="232" y="147" text-anchor="end" font-size="7" fill="#7B5BA0"
              stroke="white" stroke-width="2.5" paint-order="stroke">긴자</text>

        <!-- ══ 랜드마크 — 파란 ══
             혼무라라운지: 133.9972, 34.4610 → cx=293 cy=107
             안도뮤지엄:  133.9966, 34.4595 → cx=273 (왜곡→cx=305 cy=145, 도로 동편)
             신미술관:    133.9985, 34.4574 → cx=337 cy=186
        -->

        <!-- 혼무라라운지 (r=7) -->
        <circle cx="293" cy="107" r="7" fill="#4A65BF" filter="url(#ps)"/>
        <text x="293" y="111" text-anchor="middle" font-size="7" fill="white">🏠</text>
        <text x="283" y="97" text-anchor="end" font-size="7" fill="#2A4599" font-weight="700"
              stroke="white" stroke-width="2.5" paint-order="stroke">라운지</text>

        <!-- 안도뮤지엄 (r=9, 왜곡: 도로 동편으로 이동) -->
        <circle cx="305" cy="145" r="9" fill="#4A65BF" filter="url(#ps)"/>
        <text x="305" y="149" text-anchor="middle" font-size="8" fill="white">🏛</text>
        <text x="317" y="142" text-anchor="start" font-size="7" fill="#2A4599" font-weight="700"
              stroke="white" stroke-width="2.5" paint-order="stroke">안도뮤지엄</text>

        <!-- 신미술관 (r=7) -->
        <circle cx="337" cy="186" r="7" fill="#4A65BF" filter="url(#ps)"/>
        <text x="337" y="190" text-anchor="middle" font-size="7" fill="white">🖼</text>
        <text x="347" y="183" text-anchor="start" font-size="7" fill="#2A4599" font-weight="700"
              stroke="white" stroke-width="2.5" paint-order="stroke">신미술관</text>

        <!-- ══ 식당 — 코랄 ══
             x = 20 + (lon - 133.989) × 33333
             y = 20 + (34.465 - lat) × 21818
             콘니치와:   133.9979, 34.4613 → cx=317 cy=101
             루크스:     133.9985, 34.4611 → cx=337 cy=105
             토시:       133.9920, 34.4603 → cx=120 cy=123
             에이프런:   133.9969, 34.4600 → cx=283 (왜곡→cx=260 cy=132, 도로 서편)
             사라장:     133.9967, 34.4578 → cx=277 cy=177
             나카오쿠:   133.9952, 34.4578 → cx=227 cy=177
        -->

        <!-- 콘니치와 -->
        <circle cx="317" cy="101" r="11" fill="#FF8F73" filter="url(#ps)"/>
        <text x="317" y="105" text-anchor="middle" font-size="9" fill="white">🍛</text>
        <text x="317" y="82" text-anchor="middle" font-size="7.5" fill="#B84020" font-weight="700"
              stroke="white" stroke-width="2.5" paint-order="stroke">콘니치와</text>

        <!-- 루크스 -->
        <circle cx="337" cy="105" r="11" fill="#FF8F73" filter="url(#ps)"/>
        <text x="337" y="109" text-anchor="middle" font-size="9" fill="white">🍕</text>
        <text x="351" y="101" text-anchor="start" font-size="7.5" fill="#B84020" font-weight="700"
              stroke="white" stroke-width="2.5" paint-order="stroke">루크스</text>

        <!-- 창작요리 토시 -->
        <circle cx="120" cy="123" r="11" fill="#FF8F73" filter="url(#ps)"/>
        <text x="120" y="127" text-anchor="middle" font-size="9" fill="white">🍱</text>
        <text x="120" y="143" text-anchor="middle" font-size="7.5" fill="#B84020" font-weight="700"
              stroke="white" stroke-width="2.5" paint-order="stroke">토시</text>

        <!-- 에이프런 (왜곡: 도로 서편 cx=260) -->
        <circle cx="260" cy="132" r="11" fill="#FF8F73" filter="url(#ps)"/>
        <text x="260" y="136" text-anchor="middle" font-size="9" fill="white">🍽</text>
        <text x="247" y="118" text-anchor="end" font-size="7.5" fill="#B84020" font-weight="700"
              stroke="white" stroke-width="2.5" paint-order="stroke">에이프런</text>

        <!-- 사라장 -->
        <circle cx="277" cy="177" r="11" fill="#FF8F73" filter="url(#ps)"/>
        <text x="277" y="181" text-anchor="middle" font-size="9" fill="white">🥞</text>
        <text x="291" y="174" text-anchor="start" font-size="7.5" fill="#B84020" font-weight="700"
              stroke="white" stroke-width="2.5" paint-order="stroke">사라장</text>

        <!-- 나카오쿠 -->
        <circle cx="227" cy="177" r="11" fill="#FF8F73" filter="url(#ps)"/>
        <text x="227" y="181" text-anchor="middle" font-size="9" fill="white">🍳</text>
        <text x="213" y="174" text-anchor="end" font-size="7.5" fill="#B84020" font-weight="700"
              stroke="white" stroke-width="2.5" paint-order="stroke">나카오쿠</text>

        <!-- ── 범례 ── -->
        <rect x="10" y="252" width="178" height="22" fill="rgba(255,255,255,0.92)" rx="6"/>
        <circle cx="22" cy="263" r="5" fill="#4A65BF"/>
        <text x="31" y="267" font-size="7" fill="#444">미술관</text>
        <circle cx="68" cy="263" r="5" fill="#9B7BBE"/>
        <text x="77" y="267" font-size="7" fill="#444">이에프로젝트 家</text>
        <circle cx="149" cy="263" r="5" fill="#FF8F73"/>
        <text x="158" y="267" font-size="7" fill="#444">식당</text>
      </svg>
    </div>
  </section>

  <!-- ─── 탭 바 ───────────────────────────────── -->
  <div class="tab-bar">
    <button class="tab-btn active-lunch" id="btn-lunch" data-tab="lunch" aria-selected="true">
      🍜 점심 식당
    </button>
    <button class="tab-btn" id="btn-art" data-tab="art" aria-selected="false">
      🖼 이에프로젝트 家
    </button>
  </div>

  <!-- ─── 탭 콘텐츠: 점심 식당 ─────────────────── -->
  <section id="tab-lunch" class="tab-content visible" role="tabpanel">
    <p class="loading">식당 정보 불러오는 중...</p>
  </section>

  <!-- ─── 탭 콘텐츠: 이에프로젝트 ──────────────── -->
  <section id="tab-art" class="tab-content" role="tabpanel">
    <p class="loading">이에프로젝트 정보 불러오는 중...</p>
  </section>

  <footer class="site-footer">
    <p>문의사항은 편히 말씀해 주세요 :)</p>
  </footer>

  <script>
    /* ── 안전 URL 검사 ── */
    function safeUrl(url) {
      if (!url || !url.includes('://')) return url;
      try {
        const u = new URL(url);
        return (u.protocol === 'https:' || u.protocol === 'http:') ? url : '#';
      } catch { return '#'; }
    }

    /* ── 탭 전환 ── */
    const tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        tabBtns.forEach(b => {
          b.classList.remove('active-lunch', 'active-art');
          b.setAttribute('aria-selected', 'false');
        });
        btn.classList.add(tab === 'lunch' ? 'active-lunch' : 'active-art');
        btn.setAttribute('aria-selected', 'true');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('visible'));
        document.getElementById('tab-' + tab).classList.add('visible');
      });
    });

    /* ── 식당 카드 렌더 ── */
    function renderRestaurants(restaurants) {
      const section = document.getElementById('tab-lunch');
      section.innerHTML = '';
      restaurants.forEach(r => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <img class="card-image" src="${safeUrl(r.image)}" alt="${r.name} 사진" loading="lazy">
          <div class="card-body">
            <h2 class="card-name">
              ${r.name}<span class="card-name-jp">${r.nameJp}</span>
            </h2>
            ${r.notice ? `<span class="notice-badge">${r.notice}</span>` : ''}
            <div class="card-section">
              <p class="card-section-label">🍱 메뉴</p>
              <p class="card-menu">${r.menu}</p>
            </div>
            <div class="card-section">
              <p class="card-section-label">✨ 추천 이유</p>
              <p class="card-reason">${r.reason}</p>
            </div>
            ${r.warningImage ? `
            <details class="card-warning">
              <summary>⚠️ 구글맵 위치 주의 — 약도 확인 필요</summary>
              <p class="card-warning-desc">지도 앱이 안내하는 방향과 실제 위치가 달라요. 근처에 도착하면 인근 안내판 약도를 확인하거나 아래 안내도를 참고하세요.</p>
              <img class="card-warning-img" src="${safeUrl(r.warningImage)}" alt="${r.name} 찾아가는 길 안내도" loading="lazy">
            </details>` : ''}
            <a class="btn-map btn-map-lunch"
               href="${safeUrl(r.mapUrl)}"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="${r.name} 지도 보기 (새 창에서 열림)">
              <span aria-hidden="true">🗺</span>&nbsp; 지도 보기
            </a>
          </div>
        `;
        section.appendChild(card);
      });
    }

    /* ── 이에프로젝트 카드 렌더 ── */
    function renderArthouses(houses) {
      const section = document.getElementById('tab-art');
      section.innerHTML = '';
      houses.forEach(h => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          ${h.image ? `<img class="card-image" src="${safeUrl(h.image)}" alt="${h.name} 사진" loading="lazy">` : ''}
          <div class="card-art-header">
            <div class="card-art-badge">家</div>
            <div class="card-art-meta">
              <h2 class="card-name">
                ${h.name}<span class="card-name-jp">${h.nameJp}</span>
              </h2>
              <p class="card-artist">${h.artist} · ${h.artistEn}</p>
              <span class="card-artwork">「${h.artwork}」</span>
            </div>
          </div>
          <div class="card-body">
            <div class="card-section">
              <p class="card-section-label">🎨 공간 · 작품</p>
              <p class="card-reason">${h.description}</p>
            </div>
            <div class="card-section">
              <p class="card-section-label">✨ 포인트</p>
              <p class="card-reason">${h.highlight}</p>
            </div>
            ${h.notice ? `<span class="notice-badge">${h.notice}</span>` : ''}
            <p class="artist-note">💎 ${h.artistNote}</p>
            <a class="btn-map btn-map-art"
               href="${safeUrl(h.mapUrl)}"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="${h.name} 지도 보기 (새 창에서 열림)">
              <span aria-hidden="true">🗺</span>&nbsp; 지도 보기
            </a>
          </div>
        `;
        section.appendChild(card);
      });
    }

    /* ── 데이터 로드 ── */
    async function loadAll() {
      try {
        const [rRes, aRes] = await Promise.all([
          fetch('restaurants.json'),
          fetch('ie-project.json')
        ]);
        if (!rRes.ok) throw new Error('restaurants.json 로딩 실패');
        if (!aRes.ok) throw new Error('ie-project.json 로딩 실패');
        const [restaurants, arthouses] = await Promise.all([rRes.json(), aRes.json()]);
        renderRestaurants(restaurants);
        renderArthouses(arthouses);
      } catch (err) {
        document.getElementById('tab-lunch').innerHTML =
          '<p class="loading">정보를 불러오지 못했어요. 가이드에게 문의하세요.</p>';
        console.error(err);
      }
    }

    loadAll();
  </script>

</body>
</html>
